name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Secret scan (Gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so gitleaks can walk all commits

      - name: Install Gitleaks
        run: |
          GITLEAKS_VERSION=8.24.3
          curl -sSfL \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Scan for leaked secrets
        # --redact: mask actual secret values in CI logs
        # --verbose: print each rule that fires so failures are actionable
        run: gitleaks detect --source . --config .gitleaks.toml --verbose --redact

  lint:
    name: Lint (ruff)
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install ruff
        run: pip install ruff==0.15.4

      # 任何 lint 命中（警告/错误）→ ruff 退出码非 0 → CI 失败
      - name: Ruff check
        run: ruff check src tests

  test:
    name: Tests + coverage
    needs: secret-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install package with test extras
        run: pip install -e ".[test]"

      # 覆盖率低于 85% → --cov-fail-under 触发非 0 退出 → CI 失败
      - name: Run tests with coverage
        run: pytest --cov=kaggler --cov-report=term-missing --cov-fail-under=85
