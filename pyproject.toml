[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "KagglerAssistant"
version = "0.0.1"
description = ""
readme = "README.md"
requires-python = ">=3.10"
dependencies = [
    "langchain-core",
    "langgraph",
    "langchain-deepseek",
    "polars",
    "python-dotenv",
    "textual"
]

[project.optional-dependencies]
test = [
    "pytest",
]

[tool.hatch.build.targets.wheel]
packages = ["src/kaggler"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]